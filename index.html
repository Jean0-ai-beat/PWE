<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Precision Lineup | JP Tech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --line-color: rgba(255, 255, 255, 0.5); }
        body { background: #020617; color: white; font-family: 'Inter', sans-serif; overflow: hidden; touch-action: none; }

        .fifa-pitch {
            background: #14361a;
            background-image: 
                repeating-linear-gradient(0deg, #1a4221 0, #1a4221 10%, #14361a 10%, #14361a 20%),
                radial-gradient(circle at 50% 50%, rgba(255,255,255,0.05) 0%, transparent 80%);
            border: 3px solid var(--line-color);
            position: relative;
            width: 100%;
            max-width: 460px;
            aspect-ratio: 3 / 4.2; 
            margin: 0 auto;
            border-radius: 8px;
            box-shadow: 0 40px 80px -15px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        /* CIRCULAR PLAYER ICON */
        .player-node {
            position: absolute;
            transform: translate(-50%, -50%);
            z-index: 20;
            cursor: grab;
            user-select: none;
            touch-action: none; /* Critical for Pointer Events */
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 80px;
            transition: scale 0.2s ease, filter 0.2s ease;
        }

        .player-circle {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            border: 3px solid var(--kit-color);
            background-color: #000;
            background-size: cover;
            background-position: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .player-number {
            position: absolute;
            bottom: -5px;
            right: -5px;
            background: var(--kit-color);
            color: black;
            font-size: 10px;
            font-weight: 900;
            padding: 2px 5px;
            border-radius: 4px;
            border: 2px solid #000;
        }

        .player-node:active { scale: 1.15; cursor: grabbing; z-index: 100; filter: brightness(1.2); }

        .player-label {
            margin-top: 8px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 9px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: 1px solid rgba(255,255,255,0.1);
            white-space: nowrap;
            max-width: 90px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Pitch Markings */
        .line { position: absolute; border: 2px solid var(--line-color); pointer-events: none; }
        .box-large { width: 56%; height: 16%; left: 22%; border-top: 0; }
        .box-small { width: 28%; height: 6%; left: 36%; border-top: 0; }
        .center-circle {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90px; height: 90px; border: 2px solid var(--line-color); border-radius: 50%;
        }
    </style>
</head>
<body class="p-4 lg:p-10">

    <div class="max-w-6xl mx-auto h-full flex flex-col">
        <div class="flex flex-col md:flex-row gap-4 mb-6 bg-slate-900/90 p-5 rounded-3xl border border-white/5 items-center">
            <div class="flex items-center gap-4 flex-1">
                <div class="w-12 h-12 bg-green-600 rounded-2xl flex items-center justify-center">
                    <i data-lucide="layout-template" class="text-black"></i>
                </div>
                <div>
                    <input type="text" id="matchTitle" value="OFFICIAL MATCHDAY" class="bg-transparent font-black text-xl uppercase outline-none text-white w-full">
                    <p class="text-[9px] font-bold text-slate-500 tracking-widest uppercase">JP Tech Solutions • Tactical Engine</p>
                </div>
            </div>

            <div class="flex gap-4">
                <input type="color" id="kitColor" value="#ffffff" oninput="refreshKitColor()" class="w-10 h-10 bg-transparent border-none cursor-pointer">
                <button onclick="downloadLineup()" class="bg-white text-black px-6 py-3 rounded-2xl font-black text-xs uppercase flex items-center gap-2 hover:bg-green-400 transition">
                    <i data-lucide="download" class="w-4 h-4"></i> Export
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start flex-1 overflow-hidden">
            <div class="lg:col-span-4 space-y-4 overflow-y-auto max-h-full pb-10">
                <div class="bg-slate-900/50 p-6 rounded-3xl border border-white/5">
                    <select id="formationSelect" onchange="applyFormation()" class="w-full bg-black p-3 rounded-xl border border-white/10 text-xs font-bold mb-4 outline-none">
                        <option value="4-3-3">FORMATION: 4-3-3</option>
                        <option value="4-4-2">FORMATION: 4-4-2</option>
                        <option value="3-5-2">FORMATION: 3-5-2</option>
                    </select>
                    <div class="flex gap-2">
                        <input type="text" id="playerName" placeholder="Player Name" class="flex-1 bg-black border border-white/10 rounded-xl p-3 text-sm outline-none">
                        <button onclick="addPlayer()" class="bg-slate-800 p-3 rounded-xl hover:bg-green-500 transition"><i data-lucide="plus"></i></button>
                    </div>
                </div>
                <div id="rosterList" class="space-y-2"></div>
            </div>

            <div class="lg:col-span-8 relative">
                <div id="pitch" class="fifa-pitch">
                    <div class="line box-large top-0"></div><div class="line box-small top-0"></div>
                    <div class="line box-large bottom-0 absolute bottom-0 w-[56%] left-[22%] border-b-0 h-[16%]"></div>
                    <div class="line box-small bottom-0 absolute bottom-0 w-[28%] left-[36%] border-b-0 h-[6%]"></div>
                    <div class="center-circle"></div>
                    <div class="absolute top-1/2 left-0 right-0 h-[1px] bg-white/20"></div>
                    <div id="playerContainer"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/90 backdrop-blur-md p-4">
        <div class="bg-slate-900 border border-white/10 w-full max-w-xs rounded-3xl p-8">
            <h3 class="font-black mb-6 uppercase text-sm text-center">Assign Player</h3>
            <select id="modalSelect" class="w-full bg-black p-4 rounded-xl mb-4 border border-white/10 text-sm"></select>
            <input type="number" id="modalNumber" value="10" class="w-full bg-black p-4 rounded-xl mb-6 border border-white/10 text-center font-bold">
            <div class="flex gap-2">
                <button onclick="closeModal()" class="flex-1 text-[10px] font-black text-slate-500 uppercase">Cancel</button>
                <button onclick="confirmPlayer()" class="flex-1 bg-green-500 py-4 rounded-xl text-[10px] font-black text-black">CONFIRM</button>
            </div>
        </div>
    </div>

    <script>
        const DESSALINES_IMG = "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Jean-Jacques-Dessalines.jpg/220px-Jean-Jacques-Dessalines.jpg";
        
        const tactics = {
            "4-3-3": [{t:90, l:50}, {t:75, l:15}, {t:75, l:38}, {t:75, l:62}, {t:75, l:85}, {t:52, l:25}, {t:55, l:50}, {t:52, l:75}, {t:18, l:15}, {t:12, l:50}, {t:18, l:85}],
            "4-4-2": [{t:90, l:50}, {t:75, l:15}, {t:75, l:38}, {t:75, l:62}, {t:75, l:85}, {t:50, l:15}, {t:50, l:38}, {t:50, l:62}, {t:50, l:85}, {t:20, l:35}, {t:20, l:65}],
            "3-5-2": [{t:90, l:50}, {t:75, l:25}, {t:75, l:50}, {t:75, l:75}, {t:50, l:10}, {t:50, l:30}, {t:52, l:50}, {t:50, l:70}, {t:50, l:90}, {t:20, l:35}, {t:20, l:65}]
        };

        let roster = JSON.parse(localStorage.getItem('jp_pro_roster_v3')) || ["Dessalines (C)", "Player 1", "Player 2"];
        let assignments = {};
        let currentIdx = null;

        function init() {
            renderRoster();
            applyFormation();
            lucide.createIcons();
        }

        function applyFormation() {
            const f = document.getElementById('formationSelect').value;
            const container = document.getElementById('playerContainer');
            container.innerHTML = '';
            
            tactics[f].forEach((pos, i) => {
                createPlayerNode(i, pos.t, pos.l);
            });
            refreshKitColor();
        }

        function createPlayerNode(id, top, left) {
            const data = assignments[id] || { name: id === 0 ? "GK" : "TAP TO ASSIGN", num: id === 0 ? 1 : id + 1 };
            const kitColor = document.getElementById('kitColor').value;
            
            const node = document.createElement('div');
            node.className = "player-node";
            node.id = `player-${id}`;
            node.style.top = top + "%";
            node.style.left = left + "%";
            node.style.setProperty('--kit-color', kitColor);

            node.innerHTML = `
                <div class="player-circle" style="background-image: url('${DESSALINES_IMG}')">
                    <div class="player-number">${data.num}</div>
                </div>
                <div class="player-label">${data.name}</div>
            `;

            // Pointer Event Engine
            node.onpointerdown = startDragging;
            node.onclick = (e) => { if(!node.dataset.dragged) openModal(id); };

            document.getElementById('playerContainer').appendChild(node);
        }

        // PRECISION DRAG ENGINE
        function startDragging(e) {
            const node = e.currentTarget;
            node.setPointerCapture(e.pointerId);
            node.dataset.dragged = ""; // Reset drag state
            
            const pitch = document.getElementById('pitch').getBoundingClientRect();
            
            const onPointerMove = (moveEvent) => {
                node.dataset.dragged = "true";
                let x = ((moveEvent.clientX - pitch.left) / pitch.width) * 100;
                let y = ((moveEvent.clientY - pitch.top) / pitch.height) * 100;

                // Keep inside pitch
                x = Math.max(5, Math.min(95, x));
                y = Math.max(5, Math.min(95, y));

                node.style.left = x + "%";
                node.style.top = y + "%";
            };

            const onPointerUp = () => {
                node.releasePointerCapture(e.pointerId);
                node.removeEventListener('pointermove', onPointerMove);
                node.removeEventListener('pointerup', onPointerUp);
                setTimeout(() => delete node.dataset.dragged, 100);
            };

            node.addEventListener('pointermove', onPointerMove);
            node.addEventListener('pointerup', onPointerUp);
        }

        function refreshKitColor() {
            const color = document.getElementById('kitColor').value;
            document.querySelectorAll('.player-node').forEach(n => {
                n.style.setProperty('--kit-color', color);
            });
        }

        function openModal(id) {
            currentIdx = id;
            const s = document.getElementById('modalSelect');
            s.innerHTML = roster.map(p => `<option value="${p}">${p}</option>`).join('');
            document.getElementById('modal').classList.remove('hidden');
        }

        function confirmPlayer() {
            assignments[currentIdx] = { 
                name: document.getElementById('modalSelect').value, 
                num: document.getElementById('modalNumber').value 
            };
            const node = document.getElementById(`player-${currentIdx}`);
            node.querySelector('.player-label').innerText = assignments[currentIdx].name;
            node.querySelector('.player-number').innerText = assignments[currentIdx].num;
            closeModal();
        }

        function addPlayer() {
            const n = document.getElementById('playerName').value;
            if(!n) return;
            roster.push(n);
            document.getElementById('playerName').value = '';
            renderRoster();
        }

        function renderRoster() {
            const list = document.getElementById('rosterList');
            list.innerHTML = roster.map((p, i) => `
                <div class="bg-white/5 p-3 rounded-xl flex justify-between items-center border border-white/5">
                    <span class="text-xs font-bold text-slate-400">${p}</span>
                    <button onclick="roster.splice(${i},1); renderRoster();" class="text-slate-700 hover:text-red-500"><i data-lucide="trash-2" class="w-3 h-3"></i></button>
                </div>
            `).join('');
            lucide.createIcons();
            localStorage.setItem('jp_pro_roster_v3', JSON.stringify(roster));
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        async function downloadLineup() {
            const canvas = await html2canvas(document.getElementById('pitch'), { scale: 3, useCORS: true });
            const link = document.createElement('a');
            link.download = 'Elite_Lineup_JP.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        init();
    </script>
</body>
</html>
