<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Pro Lineup | JP Tech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --line-color: rgba(255, 255, 255, 0.4); }
        
        /* Disable system gestures that interfere with dragging */
        body { 
            background: #020617; 
            color: white; 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden;
            touch-action: none; 
            -webkit-user-select: none;
            user-select: none;
        }

        .fifa-pitch {
            background: #14361a;
            background-image: 
                repeating-linear-gradient(0deg, #1a4221 0, #1a4221 10%, #14361a 10%, #14361a 20%);
            border: 2px solid var(--line-color);
            position: relative;
            width: 100%;
            max-width: 420px;
            aspect-ratio: 3 / 4.2; 
            margin: 0 auto;
            border-radius: 8px;
            overflow: hidden;
            /* Ensures pitch doesn't move when touched */
            touch-action: none;
        }

        /* MOBILE OPTIMIZED PLAYER NODE */
        .player-node {
            position: absolute;
            transform: translate(-50%, -50%);
            z-index: 20;
            /* Larger invisible hit-area for fingers (80px x 100px) */
            width: 80px;
            height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            touch-action: none; 
            cursor: grab;
        }

        .player-circle {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: 3px solid var(--kit-color, #fff);
            background: #000 url('https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Jean-Jacques-Dessalines.jpg/220px-Jean-Jacques-Dessalines.jpg') center/cover no-repeat;
            box-shadow: 0 8px 15px rgba(0,0,0,0.5);
            pointer-events: none; /* Let parent node handle the touch */
        }

        .player-label {
            margin-top: 6px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            border: 1px solid rgba(255,255,255,0.1);
            pointer-events: none;
        }

        /* Pitch Elements */
        .line { position: absolute; border: 1px solid var(--line-color); pointer-events: none; }
        .box-large { width: 56%; height: 16%; left: 22%; border-top: 0; }
        .center-circle {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80px; height: 80px; border: 1px solid var(--line-color); border-radius: 50%;
        }

        /* Scrollable roster for mobile */
        .scroll-container {
            -webkit-overflow-scrolling: touch;
            touch-action: pan-y;
        }
    </style>
</head>
<body class="p-4">

    <div class="max-w-md mx-auto space-y-4 h-full flex flex-col">
        <div class="bg-slate-900 p-4 rounded-2xl flex justify-between items-center border border-white/5 shadow-xl">
            <div>
                <h1 class="text-lg font-black tracking-tighter">LINEUP PRO</h1>
                <p class="text-[8px] text-green-500 font-bold uppercase tracking-widest">JP Tech Solutions</p>
            </div>
            <div class="flex gap-2">
                <input type="color" id="kitColor" value="#ffffff" oninput="updateKitColor()" class="w-8 h-8 bg-transparent border-none">
                <button onclick="downloadLineup()" class="bg-green-600 p-2 rounded-lg"><i data-lucide="camera" class="w-5 h-5 text-black"></i></button>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-2 touch-action-pan-y">
            <select id="formationSelect" onchange="initPitch()" class="bg-slate-800 text-[10px] font-bold p-3 rounded-xl border-none outline-none uppercase">
                <option value="4-3-3">4-3-3 Attack</option>
                <option value="4-4-2">4-4-2 Classic</option>
                <option value="3-5-2">3-5-2 Wing</option>
            </select>
            <button onclick="document.getElementById('rosterModal').classList.remove('hidden')" class="bg-slate-800 text-[10px] font-bold rounded-xl uppercase">Manage Roster</button>
        </div>

        <div id="pitch" class="fifa-pitch shadow-2xl">
            <div class="line box-large top-0"></div>
            <div class="line box-large bottom-0 absolute bottom-0 border-b-0"></div>
            <div class="center-circle"></div>
            <div class="absolute top-1/2 left-0 right-0 h-[1px] bg-white/10"></div>
            
            <div id="playerContainer"></div>
        </div>

        <p class="text-[9px] text-slate-500 text-center italic">Drag players to adjust. Tap player to swap name.</p>
    </div>

    <div id="rosterModal" class="hidden fixed inset-0 z-[100] bg-black p-6 flex flex-col">
        <div class="flex justify-between items-center mb-6">
            <h2 class="font-black">TEAM ROSTER</h2>
            <button onclick="document.getElementById('rosterModal').classList.add('hidden')" class="text-red-500 font-bold">CLOSE</button>
        </div>
        <div class="flex gap-2 mb-4">
            <input type="text" id="newPlayer" placeholder="Name..." class="flex-1 bg-slate-900 border-none p-4 rounded-xl text-sm">
            <button onclick="addPlayer()" class="bg-green-600 px-6 rounded-xl font-bold text-black">ADD</button>
        </div>
        <div id="rosterList" class="space-y-2 overflow-y-auto flex-1 scroll-container"></div>
    </div>

    <div id="assignModal" class="hidden fixed inset-0 z-[110] bg-black/90 flex items-center justify-center p-6">
        <div class="bg-slate-900 w-full rounded-3xl p-8 border border-white/10">
            <h3 class="text-center font-black mb-6 text-sm">SELECT PLAYER</h3>
            <div id="modalRoster" class="grid grid-cols-2 gap-2 max-h-60 overflow-y-auto mb-6 scroll-container"></div>
            <button onclick="document.getElementById('assignModal').classList.add('hidden')" class="w-full p-4 text-slate-500 font-bold text-xs">CANCEL</button>
        </div>
    </div>

    <script>
        const tactics = {
            "4-3-3": [{t:88, l:50}, {t:72, l:15}, {t:72, l:38}, {t:72, l:62}, {t:72, l:85}, {t:48, l:25}, {t:50, l:50}, {t:48, l:75}, {t:18, l:15}, {t:12, l:50}, {t:18, l:85}],
            "4-4-2": [{t:88, l:50}, {t:72, l:15}, {t:72, l:38}, {t:72, l:62}, {t:72, l:85}, {t:45, l:15}, {t:45, l:38}, {t:45, l:62}, {t:45, l:85}, {t:18, l:35}, {t:18, l:65}],
            "3-5-2": [{t:88, l:50}, {t:72, l:25}, {t:72, l:50}, {t:72, l:75}, {t:45, l:10}, {t:45, l:30}, {t:48, l:50}, {t:45, l:70}, {t:45, l:90}, {t:18, l:35}, {t:18, l:65}]
        };

        let roster = JSON.parse(localStorage.getItem('jp_mobile_roster')) || ["Dessalines", "Vini Jr", "Mbappé", "Courtois"];
        let assignments = {};
        let activeSlot = null;

        function initPitch() {
            const formation = document.getElementById('formationSelect').value;
            const container = document.getElementById('playerContainer');
            container.innerHTML = '';

            tactics[formation].forEach((pos, i) => {
                const node = document.createElement('div');
                node.className = "player-node";
                node.id = `slot-${i}`;
                node.style.top = pos.t + "%";
                node.style.left = pos.l + "%";

                const name = assignments[i] || (i === 0 ? "GK" : "SWAP");
                node.innerHTML = `
                    <div class="player-circle"></div>
                    <div class="player-label">${name}</div>
                `;

                // TOUCH & MOUSE ENGINE
                node.onpointerdown = handleDrag;
                node.onclick = (e) => { if(!node.isDragging) openAssignModal(i); };

                container.appendChild(node);
            });
            updateKitColor();
        }

        function handleDrag(e) {
            const node = e.currentTarget;
            node.setPointerCapture(e.pointerId);
            node.isDragging = false;
            
            const pitch = document.getElementById('pitch').getBoundingClientRect();

            const onMove = (moveEv) => {
                node.isDragging = true;
                let x = ((moveEv.clientX - pitch.left) / pitch.width) * 100;
                let y = ((moveEv.clientY - pitch.top) / pitch.height) * 100;

                // Constraints for Mobile view
                node.style.left = Math.max(8, Math.min(92, x)) + "%";
                node.style.top = Math.max(8, Math.min(92, y)) + "%";
            };

            const onUp = () => {
                node.releasePointerCapture(e.pointerId);
                node.removeEventListener('pointermove', onMove);
                node.removeEventListener('pointerup', onUp);
                // Tiny delay to distinguish between drag and tap
                setTimeout(() => { if(node.isDragging) node.isDragging = false; }, 100);
            };

            node.addEventListener('pointermove', onMove);
            node.addEventListener('pointerup', onUp);
        }

        function openAssignModal(slot) {
            activeSlot = slot;
            const modalRoster = document.getElementById('modalRoster');
            modalRoster.innerHTML = roster.map(name => `
                <button onclick="selectPlayer('${name}')" class="bg-slate-800 p-4 rounded-xl text-[10px] font-bold truncate">${name}</button>
            `).join('');
            document.getElementById('assignModal').classList.remove('hidden');
        }

        function selectPlayer(name) {
            assignments[activeSlot] = name;
            document.getElementById(`slot-${activeSlot}`).querySelector('.player-label').innerText = name;
            document.getElementById('assignModal').classList.add('hidden');
        }

        function addPlayer() {
            const input = document.getElementById('newPlayer');
            if(input.value) {
                roster.push(input.value);
                input.value = '';
                renderRosterList();
            }
        }

        function renderRosterList() {
            const list = document.getElementById('rosterList');
            list.innerHTML = roster.map((p, i) => `
                <div class="bg-slate-900 p-4 rounded-xl flex justify-between items-center">
                    <span class="text-sm">${p}</span>
                    <button onclick="roster.splice(${i},1); renderRosterList();" class="text-red-500 text-xs font-bold">REMOVE</button>
                </div>
            `).join('');
            localStorage.setItem('jp_mobile_roster', JSON.stringify(roster));
        }

        function updateKitColor() {
            const color = document.getElementById('kitColor').value;
            document.documentElement.style.setProperty('--kit-color', color);
        }

        async function downloadLineup() {
            const canvas = await html2canvas(document.getElementById('pitch'), { scale: 2 });
            const link = document.createElement('a');
            link.download = 'JP_Lineup.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        // Initialize
        initPitch();
        renderRosterList();
        lucide.createIcons();
    </script>
</body>
</html>
