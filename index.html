<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soccer Lineup Pro | JP Tech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --line-color: rgba(255, 255, 255, 0.5); }
        body { background: #05080a; color: white; font-family: 'Inter', sans-serif; }

        /* ADJUSTED PITCH SIZE: PORTRAIT 3:4 RATIO */
        .fifa-pitch {
            background: #1b4332;
            background-image: 
                repeating-linear-gradient(0deg, #2d6a4f 0%, #2d6a4f 10%, #1b4332 10%, #1b4332 20%),
                radial-gradient(circle at 50% 50%, rgba(255,255,255,0.05) 0%, transparent 80%);
            border: 4px solid var(--line-color);
            position: relative;
            width: 100%;
            max-width: 500px; /* Standard Builder Width */
            aspect-ratio: 3 / 4; 
            margin: 0 auto;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            border-radius: 12px;
        }

        .line { position: absolute; border: 2px solid var(--line-color); pointer-events: none; }
        .box-large { width: 50%; height: 14%; left: 25%; border-top: 0; }
        .box-small { width: 24%; height: 5%; left: 38%; border-top: 0; }
        .bottom { bottom: 0; border-top: 2px solid var(--line-color); border-bottom: 0; }
        .center-circle {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80px; height: 80px; border: 2px solid var(--line-color); border-radius: 50%;
        }

        .player-node { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .jersey-svg { filter: drop-shadow(0 5px 10px rgba(0,0,0,0.4)); }
    </style>
</head>
<body class="p-4 bg-slate-950">

    <div class="max-w-6xl mx-auto">
        <div class="flex flex-col md:flex-row gap-4 mb-6 bg-slate-900/50 p-4 rounded-2xl border border-white/5 items-center">
            <input type="text" id="matchTitle" value="MATCH DAY: REAL MADRID" class="bg-transparent font-black italic text-xl uppercase outline-none text-green-400 w-full md:w-64">
            
            <div class="flex gap-4 items-center">
                <select id="formationSelect" class="bg-slate-800 text-xs font-bold p-2 rounded-lg outline-none border border-white/10">
                    <option value="4-4-2">4-4-2</option>
                    <option value="4-3-3">4-3-3</option>
                    <option value="3-5-2">3-5-2</option>
                    <option value="5-4-1">5-4-1</option>
                </select>
                <input type="color" id="kitColor" value="#ffffff" class="w-8 h-8 bg-transparent border-none cursor-pointer">
                <button onclick="saveTactics()" class="bg-green-600 hover:bg-green-500 text-black px-4 py-2 rounded-lg font-bold text-xs flex items-center gap-2">
                    <i data-lucide="save" class="w-4 h-4"></i> SAVE
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
            <div class="lg:col-span-4 bg-slate-900/80 p-6 rounded-3xl border border-white/5">
                <h2 class="text-[10px] font-black uppercase tracking-widest text-slate-500 mb-4">Squad List</h2>
                <div class="flex gap-2 mb-4">
                    <input type="text" id="playerName" placeholder="Player name..." class="flex-1 bg-black/40 border border-white/10 rounded-xl p-3 text-sm outline-none">
                    <button onclick="addPlayer()" class="bg-white text-black p-3 rounded-xl hover:bg-green-400 transition"><i data-lucide="plus"></i></button>
                </div>
                <div id="rosterList" class="space-y-2 max-h-[300px] overflow-y-auto pr-2"></div>
            </div>

            <div class="lg:col-span-8">
                <div class="fifa-pitch" id="pitch">
                    <div class="line box-large top-0"></div>
                    <div class="line box-small top-0"></div>
                    <div class="line box-large bottom"></div>
                    <div class="line box-small bottom"></div>
                    <div class="center-circle"></div>
                    <div class="absolute top-1/2 left-0 right-0 h-[1.5px] bg-white/20"></div>
                    
                    <div id="playerContainer"></div>
                </div>
                
                <div class="mt-6 text-center">
                    <p class="text-[10px] font-bold text-slate-600 tracking-[0.4em] uppercase">Powered by JP Tech Solutions</p>
                </div>
            </div>
        </div>
    </div>

    <div id="modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/90 backdrop-blur-sm p-4">
        <div class="bg-slate-900 border border-white/10 w-full max-w-xs rounded-3xl p-8">
            <h3 class="font-black mb-4 uppercase text-sm tracking-widest">Select Player</h3>
            <select id="modalSelect" class="w-full bg-black/40 p-3 rounded-xl mb-4 border border-white/10 text-sm"></select>
            <input type="number" id="modalNumber" value="10" class="w-full bg-black/40 p-3 rounded-xl mb-6 border border-white/10 text-sm">
            <div class="flex gap-2">
                <button onclick="closeModal()" class="flex-1 text-xs font-bold text-slate-500">CANCEL</button>
                <button onclick="confirmPlayer()" class="flex-1 bg-green-600 py-3 rounded-xl text-xs font-black">CONFIRM</button>
            </div>
        </div>
    </div>

    <script>
        const tactics = {
            "4-4-2": [{t:92, l:50}, {t:78, l:15}, {t:78, l:38}, {t:78, l:62}, {t:78, l:85}, {t:50, l:15}, {t:50, l:38}, {t:50, l:62}, {t:50, l:85}, {t:20, l:35}, {t:20, l:65}],
            "4-3-3": [{t:92, l:50}, {t:78, l:15}, {t:78, l:38}, {t:78, l:62}, {t:78, l:85}, {t:55, l:25}, {t:58, l:50}, {t:55, l:75}, {t:18, l:15}, {t:12, l:50}, {t:18, l:85}],
            "3-5-2": [{t:92, l:50}, {t:78, l:25}, {t:78, l:50}, {t:78, l:75}, {t:50, l:10}, {t:52, l:30}, {t:55, l:50}, {t:52, l:70}, {t:50, l:90}, {t:18, l:35}, {t:18, l:65}],
            "5-4-1": [{t:92, l:50}, {t:78, l:10}, {t:80, l:30}, {t:80, l:50}, {t:80, l:70}, {t:78, l:90}, {t:48, l:20}, {t:48, l:40}, {t:48, l:60}, {t:48, l:80}, {t:18, l:50}]
        };

        let roster = JSON.parse(localStorage.getItem('jp_roster')) || ["Vinícius Jr.", "Jude Bellingham", "Rodrygo"];
        let assignments = {};
        let currentSpot = null;

        function init() {
            renderRoster();
            updatePitch();
            lucide.createIcons();
        }

        function renderRoster() {
            const list = document.getElementById('rosterList');
            list.innerHTML = roster.map((p, i) => `
                <div class="bg-black/20 p-3 rounded-xl border border-white/5 flex justify-between items-center group">
                    <span class="text-xs font-bold text-slate-400">${p}</span>
                    <button onclick="removePlayer(${i})" class="text-red-900 group-hover:text-red-500 transition"><i data-lucide="x" class="w-3 h-3"></i></button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function updatePitch() {
            const formKey = document.getElementById('formationSelect').value;
            const container = document.getElementById('playerContainer');
            const color = document.getElementById('kitColor').value;
            container.innerHTML = '';

            tactics[formKey].forEach((pos, i) => {
                const data = assignments[i] || { name: "Assign", num: i+1 };
                const node = document.createElement('div');
                node.className = "player-node absolute -translate-x-1/2 -translate-y-1/2 flex flex-col items-center w-20 cursor-pointer z-10";
                node.style.top = pos.t + "%";
                node.style.left = pos.l + "%";
                node.onclick = () => openModal(i);

                node.innerHTML = `
                    <div class="jersey-svg relative">
                        <svg width="42" height="42" viewBox="0 0 24 24" fill="${color}" stroke="black" stroke-width="1.2">
                            <path d="M20.38 3.46L16 2H8L3.62 3.46a2 2 0 0 0-1.34 1.76V8c0 .42.26.8.65.95l3.69 1.43v10c0 1.1.9 2 2 2h7c1.1 0 2-.9 2-2V10.38l3.69-1.43c.39-.15.65-.53.65-.95V5.22a2 2 0 0 0-1.34-1.76z"/>
                        </svg>
                        <span class="absolute inset-0 flex items-center justify-center text-[10px] font-black text-black mt-2">${data.num}</span>
                    </div>
                    <div class="mt-1 bg-black/80 px-2 py-0.5 rounded border border-white/10 text-[8px] font-black uppercase text-center w-full truncate">
                        ${data.name}
                    </div>
                `;
                container.appendChild(node);
            });
        }

        function openModal(idx) {
            currentSpot = idx;
            const select = document.getElementById('modalSelect');
            select.innerHTML = roster.map(p => `<option value="${p}">${p}</option>`).join('');
            document.getElementById('modal').classList.remove('hidden');
        }

        function confirmPlayer() {
            const name = document.getElementById('modalSelect').value;
            const num = document.getElementById('modalNumber').value;
            assignments[currentSpot] = { name, num };
            updatePitch();
            closeModal();
        }

        function addPlayer() {
            const name = document.getElementById('playerName').value;
            if(!name) return;
            roster.push(name);
            document.getElementById('playerName').value = '';
            renderRoster();
        }

        function removePlayer(idx) {
            roster.splice(idx, 1);
            renderRoster();
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        
        function saveTactics() {
            localStorage.setItem('jp_roster', JSON.stringify(roster));
            alert("Lineup settings saved to JP Tech local storage!");
        }

        document.getElementById('formationSelect').addEventListener('change', updatePitch);
        document.getElementById('kitColor').addEventListener('input', updatePitch);

        init();
    </script>
</body>
</html>
