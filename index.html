<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soccer Lineup Pro | JP Tech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --line-color: rgba(255, 255, 255, 0.5); }
        body { background: #020617; color: white; font-family: 'Inter', sans-serif; }

        .fifa-pitch {
            background: #1b4332;
            background-image: 
                repeating-linear-gradient(0deg, #2d6a4f 0%, #2d6a4f 10%, #1b4332 10%, #1b4332 20%),
                radial-gradient(circle at 50% 50%, rgba(255,255,255,0.05) 0%, transparent 80%);
            border: 4px solid var(--line-color);
            position: relative;
            width: 100%;
            max-width: 500px;
            aspect-ratio: 3 / 4; 
            margin: 0 auto;
            border-radius: 12px;
            overflow: hidden; /* Ensures clean edges on export */
        }

        .jersey-pattern {
            width: 44px; height: 44px;
            clip-path: path("M20.38 3.46L16 2H8L3.62 3.46a2 2 0 0 0-1.34 1.76V8c0 .42.26.8.65.95l3.69 1.43v10c0 1.1.9 2 2 2h7c1.1 0 2-.9 2-2V10.38l3.69-1.43c.39-.15.65-.53.65-.95V5.22a2 2 0 0 0-1.34-1.76z");
            position: relative;
        }

        .pattern-solid { background-color: var(--primary); }
        
        .line { position: absolute; border: 2.5px solid var(--line-color); pointer-events: none; }
        .box-large { width: 50%; height: 14%; left: 25%; border-top: 0; }
        .box-small { width: 24%; height: 5%; left: 38%; border-top: 0; }
        .bottom { bottom: 0; border-top: 2.5px solid var(--line-color); border-bottom: 0; }
        .center-circle {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80px; height: 80px; border: 2.5px solid var(--line-color); border-radius: 50%;
        }
        .player-node { transition: all 0.3s ease; }
    </style>
</head>
<body class="p-4 lg:p-10">

    <div class="max-w-6xl mx-auto">
        <div class="flex flex-col md:flex-row gap-6 mb-10 bg-slate-900/40 p-6 rounded-[2rem] border border-white/5 items-center">
            <div class="flex items-center gap-5 flex-1">
                <div onclick="document.getElementById('logoInput').click()" class="cursor-pointer">
                    <div id="logoPreview" class="w-16 h-16 bg-black/60 rounded-2xl border border-white/10 flex items-center justify-center overflow-hidden">
                        <i data-lucide="shield" class="w-6 h-6 text-slate-700"></i>
                    </div>
                    <input type="file" id="logoInput" class="hidden" accept="image/*" onchange="handleLogo(this)">
                </div>
                <div>
                    <input type="text" id="matchTitle" value="MATCH DAY: EL CLÁSICO" class="bg-transparent font-black italic text-2xl uppercase outline-none text-green-400 w-full focus:text-white transition">
                    <p class="text-[9px] font-bold text-slate-500 tracking-[0.3em] uppercase">Lineup System | JP Tech Solutions</p>
                </div>
            </div>

            <div class="flex gap-3">
                <div class="flex flex-col items-center">
                    <label class="text-[8px] font-black text-slate-600 mb-1">GK</label>
                    <input type="color" id="gkColor" value="#fbbf24" oninput="updatePitch()" class="w-8 h-8 bg-transparent border-none cursor-pointer">
                </div>
                <div class="flex flex-col items-center">
                    <label class="text-[8px] font-black text-slate-600 mb-1">KIT</label>
                    <input type="color" id="kitColor" value="#ffffff" oninput="updatePitch()" class="w-8 h-8 bg-transparent border-none cursor-pointer">
                </div>
                <button onclick="downloadLineup()" class="bg-green-600 text-black px-6 py-3 rounded-xl font-black text-xs flex items-center gap-2 hover:bg-green-400 transition ml-4">
                    <i data-lucide="download" class="w-4 h-4"></i> DOWNLOAD PNG
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-12 items-start">
            <div class="lg:col-span-4 space-y-6">
                <div class="bg-slate-900/60 p-6 rounded-3xl border border-white/5">
                    <h2 class="text-[10px] font-black uppercase text-slate-500 mb-4 tracking-widest">Team Registry</h2>
                    <div class="flex gap-2 mb-6">
                        <input type="text" id="playerName" placeholder="Add player..." class="flex-1 bg-black/50 border border-white/10 rounded-xl p-3 text-sm outline-none focus:border-green-500/50">
                        <button onclick="addPlayer()" class="bg-white text-black p-3 rounded-xl hover:bg-green-400 transition"><i data-lucide="plus"></i></button>
                    </div>
                    <div id="rosterList" class="space-y-2 max-h-[300px] overflow-y-auto custom-scrollbar"></div>
                </div>

                <div class="bg-slate-900/60 p-6 rounded-3xl border border-white/5">
                    <label class="text-[10px] font-black uppercase text-slate-500 block mb-3">Tactic Selection</label>
                    <select id="formationSelect" onchange="updatePitch()" class="w-full bg-black/50 text-xs font-bold p-3 rounded-xl outline-none border border-white/10">
                        <option value="4-4-2">4-4-2 (Classic)</option>
                        <option value="4-3-3">4-3-3 (Attack)</option>
                        <option value="3-5-2">3-5-2 (Width)</option>
                        <option value="5-4-1">5-4-1 (Defensive)</option>
                    </select>
                </div>
            </div>

            <div class="lg:col-span-8 flex justify-center">
                <div id="exportArea"> <div class="fifa-pitch" id="pitch">
                        <div class="line box-large top-0"></div>
                        <div class="line box-small top-0"></div>
                        <div class="line box-large bottom"></div>
                        <div class="line box-small bottom"></div>
                        <div class="center-circle"></div>
                        <div class="absolute top-1/2 left-0 right-0 h-[1.5px] bg-white/10"></div>
                        <div id="playerContainer"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/95 backdrop-blur-md p-4">
        <div class="bg-slate-900 border border-white/10 w-full max-w-xs rounded-[2.5rem] p-10 shadow-2xl">
            <h3 class="font-black mb-6 uppercase text-sm tracking-[0.2em] text-green-500 text-center">Select Player</h3>
            <select id="modalSelect" class="w-full bg-black/60 p-4 rounded-2xl mb-4 border border-white/10 text-sm appearance-none outline-none"></select>
            <div class="flex items-center gap-4 mb-8 bg-black/60 p-4 rounded-2xl border border-white/10">
                <span class="text-[10px] font-bold text-slate-500 uppercase">Number:</span>
                <input type="number" id="modalNumber" value="10" class="bg-transparent font-black text-xl outline-none w-full text-right">
            </div>
            <div class="flex gap-3">
                <button onclick="closeModal()" class="flex-1 text-[10px] font-black text-slate-500 uppercase">Cancel</button>
                <button onclick="confirmPlayer()" class="flex-1 bg-green-600 py-4 rounded-2xl text-[10px] font-black text-black uppercase tracking-widest">Assign</button>
            </div>
        </div>
    </div>

    <script>
        const tactics = {
            "4-4-2": [{t:92, l:50}, {t:78, l:15}, {t:78, l:38}, {t:78, l:62}, {t:78, l:85}, {t:50, l:15}, {t:50, l:38}, {t:50, l:62}, {t:50, l:85}, {t:20, l:35}, {t:20, l:65}],
            "4-3-3": [{t:92, l:50}, {t:78, l:15}, {t:78, l:38}, {t:78, l:62}, {t:78, l:85}, {t:55, l:25}, {t:58, l:50}, {t:55, l:75}, {t:18, l:15}, {t:12, l:50}, {t:18, l:85}],
            "3-5-2": [{t:92, l:50}, {t:78, l:25}, {t:78, l:50}, {t:78, l:75}, {t:50, l:10}, {t:52, l:30}, {t:55, l:50}, {t:52, l:70}, {t:50, l:90}, {t:18, l:35}, {t:18, l:65}],
            "5-4-1": [{t:92, l:50}, {t:78, l:10}, {t:80, l:30}, {t:80, l:50}, {t:80, l:70}, {t:78, l:90}, {t:48, l:20}, {t:48, l:40}, {t:48, l:60}, {t:48, l:80}, {t:18, l:50}]
        };

        let roster = JSON.parse(localStorage.getItem('jp_pro_roster')) || ["Courtois", "Modric", "Mbappé"];
        let assignments = {};
        let currentSpot = null;
        let savedLogo = localStorage.getItem('jp_pro_logo') || null;

        function init() {
            if(savedLogo) document.getElementById('logoPreview').innerHTML = `<img src="${savedLogo}" class="w-full h-full object-contain p-2">`;
            renderRoster();
            updatePitch();
            lucide.createIcons();
        }

        function handleLogo(input) {
            const reader = new FileReader();
            reader.onload = (e) => {
                savedLogo = e.target.result;
                document.getElementById('logoPreview').innerHTML = `<img src="${savedLogo}" class="w-full h-full object-contain p-2">`;
                localStorage.setItem('jp_pro_logo', savedLogo);
            }
            reader.readAsDataURL(input.files[0]);
        }

        function updatePitch() {
            const formKey = document.getElementById('formationSelect').value;
            const primary = document.getElementById('kitColor').value;
            const gkColor = document.getElementById('gkColor').value;
            const container = document.getElementById('playerContainer');
            container.innerHTML = '';

            tactics[formKey].forEach((pos, i) => {
                const isGK = (i === 0);
                const data = assignments[i] || { name: isGK ? "GK" : "Assign", num: isGK ? 1 : i+1 };
                const node = document.createElement('div');
                node.className = "player-node absolute -translate-x-1/2 -translate-y-1/2 flex flex-col items-center w-20 cursor-pointer z-10";
                node.style.top = pos.t + "%";
                node.style.left = pos.l + "%";
                node.onclick = () => openModal(i);

                node.innerHTML = `
                    <div class="jersey-pattern pattern-solid shadow-xl" style="--primary: ${isGK ? gkColor : primary}">
                        <span class="absolute inset-0 flex items-center justify-center text-[10px] font-black text-black mt-2">${data.num}</span>
                    </div>
                    <div class="mt-1 bg-black/90 px-2 py-0.5 rounded border border-white/5 text-[8px] font-black uppercase text-center w-full truncate">
                        ${data.name}
                    </div>
                `;
                container.appendChild(node);
            });
        }

        function downloadLineup() {
            const el = document.getElementById('pitch');
            html2canvas(el, { backgroundColor: '#020617', scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                link.download = `JP_Lineup_${Date.now()}.png`;
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        function openModal(idx) {
            currentSpot = idx;
            document.getElementById('modalSelect').innerHTML = roster.map(p => `<option value="${p}">${p}</option>`).join('');
            document.getElementById('modal').classList.remove('hidden');
        }

        function confirmPlayer() {
            assignments[currentSpot] = { name: document.getElementById('modalSelect').value, num: document.getElementById('modalNumber').value };
            updatePitch();
            closeModal();
        }

        function addPlayer() {
            const name = document.getElementById('playerName').value;
            if(!name) return;
            roster.push(name);
            document.getElementById('playerName').value = '';
            renderRoster();
        }

        function renderRoster() {
            document.getElementById('rosterList').innerHTML = roster.map((p, i) => `
                <div class="bg-white/5 p-3 rounded-xl flex justify-between items-center group border border-white/5">
                    <span class="text-xs font-medium text-slate-400">${p}</span>
                    <button onclick="removePlayer(${i})" class="text-slate-700 hover:text-red-500 transition"><i data-lucide="trash-2" class="w-3 h-3"></i></button>
                </div>
            `).join('');
            lucide.createIcons();
            localStorage.setItem('jp_pro_roster', JSON.stringify(roster));
        }

        function removePlayer(idx) { roster.splice(idx, 1); renderRoster(); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        init();
    </script>
</body>
</html>
