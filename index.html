<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soccer Lineup Pro | JP Tech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --line-color: rgba(255, 255, 255, 0.7); }
        body { background: #0a0f14; color: white; font-family: 'Inter', sans-serif; }

        /* 1. FIFA-STYLE 3D GRASS TEXTURE */
        .fifa-pitch {
            background: #1b4332;
            background-image: 
                repeating-linear-gradient(90deg, #2d6a4f 0%, #2d6a4f 5%, #1b4332 5%, #1b4332 10%),
                radial-gradient(circle at 50% 50%, rgba(255,255,255,0.1) 0%, transparent 80%);
            border: 4px solid var(--line-color);
            position: relative;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.5), 0 20px 50px rgba(0,0,0,0.8);
        }

        /* 3D Lines */
        .line { position: absolute; border: 2px solid var(--line-color); pointer-events: none; }
        .box-large { width: 40%; height: 16%; left: 30%; border-top: 0; }
        .box-small { width: 18%; height: 6%; left: 41%; border-top: 0; }
        .bottom { bottom: 0; border-top: 2px solid var(--line-color); border-bottom: 0; }
        
        .center-circle {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 120px; height: 120px; border: 2px solid var(--line-color); rounded-full;
        }

        /* Player Pulse */
        .player-node:hover .jersey-svg { transform: scale(1.1) translateY(-5px); filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5)); }
        .jersey-svg { transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        /* Modal Blur */
        #modal { backdrop-filter: blur(8px); }
    </style>
</head>
<body class="p-4">

    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-6 bg-slate-900/80 p-6 rounded-2xl border border-white/10">
            <div>
                <h1 class="text-3xl font-black italic tracking-tighter text-green-400">JP TECH <span class="text-white">LINEUP PRO</span></h1>
                <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">Tactical Management Engine v3.0</p>
            </div>
            <div class="flex gap-3">
                <input type="color" id="kitColor" value="#3b82f6" class="w-10 h-10 bg-transparent border-none cursor-pointer">
                <button onclick="saveToMemory()" class="bg-green-600 hover:bg-green-500 px-6 py-2 rounded-xl font-bold flex items-center gap-2 transition">
                    <i data-lucide="save"></i> SAVE TACTICS
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-3 bg-slate-900 p-5 rounded-3xl border border-white/5 shadow-2xl h-fit">
                <h2 class="text-sm font-black text-slate-500 uppercase mb-4 tracking-widest">Global Roster</h2>
                <div class="flex gap-2 mb-6">
                    <input type="text" id="newPlayerName" placeholder="Player Name..." class="w-full bg-slate-800 border-none rounded-lg p-3 text-sm focus:ring-2 ring-green-500 outline-none">
                    <button onclick="addToList()" class="bg-white text-black p-3 rounded-lg hover:bg-green-400 transition">
                        <i data-lucide="plus"></i>
                    </button>
                </div>
                <div id="masterList" class="space-y-2 max-h-[500px] overflow-y-auto pr-2">
                    </div>
            </div>

            <div class="lg:col-span-9">
                <div class="fifa-pitch aspect-[4/3] rounded-3xl overflow-hidden relative" id="mainPitch">
                    <div class="line box-large top-0"></div>
                    <div class="line box-small top-0"></div>
                    <div class="line box-large bottom"></div>
                    <div class="line box-small bottom"></div>
                    <div class="center-circle"></div>
                    <div class="absolute top-1/2 left-0 right-0 h-[2px] bg-white/30"></div>
                    
                    <div id="playerContainer"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-white/20 w-full max-w-md rounded-3xl shadow-2xl p-8">
            <h3 class="text-2xl font-bold mb-2">Assign Player</h3>
            <p class="text-slate-400 text-sm mb-6">Select a player from your roster and assign a number.</p>
            
            <div class="space-y-4">
                <select id="modalSelect" class="w-full bg-slate-800 p-4 rounded-xl outline-none border border-white/10 text-white"></select>
                <input type="number" id="modalNumber" placeholder="Jersey Number (e.g. 10)" class="w-full bg-slate-800 p-4 rounded-xl outline-none border border-white/10">
                <div class="flex gap-3 pt-4">
                    <button onclick="closeModal()" class="flex-1 py-3 font-bold text-slate-400">Cancel</button>
                    <button onclick="confirmAssignment()" class="flex-1 bg-green-600 py-3 rounded-xl font-bold hover:bg-green-500 transition">Confirm</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let roster = JSON.parse(localStorage.getItem('jp_roster')) || ["Lionel Messi", "Cristiano Ronaldo", "K. Mbappe"];
        let activeSlotIndex = null;
        const formation = [
            {t:88, l:50}, // GK
            {t:72, l:20}, {t:72, l:40}, {t:72, l:60}, {t:72, l:80}, // DEF
            {t:45, l:30}, {t:45, l:50}, {t:45, l:70}, // MID
            {t:15, l:20}, {t:12, l:50}, {t:15, l:80} // ATK
        ];

        function init() {
            renderList();
            renderPitch();
            lucide.createIcons();
        }

        function renderList() {
            const list = document.getElementById('masterList');
            list.innerHTML = roster.map(p => `
                <div class="bg-slate-800/50 p-3 rounded-xl border border-white/5 flex justify-between group">
                    <span class="font-medium">${p}</span>
                    <button onclick="deletePlayer('${p}')" class="opacity-0 group-hover:opacity-100 text-red-400 transition"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function renderPitch() {
            const container = document.getElementById('playerContainer');
            const color = document.getElementById('kitColor').value;
            container.innerHTML = '';

            formation.forEach((pos, i) => {
                const node = document.createElement('div');
                node.className = "player-node absolute -translate-x-1/2 -translate-y-1/2 flex flex-col items-center w-28 cursor-pointer group";
                node.style.top = pos.t + "%";
                node.style.left = pos.l + "%";
                node.onclick = () => openModal(i);

                node.innerHTML = `
                    <div class="jersey-svg relative">
                        <svg width="50" height="50" viewBox="0 0 24 24" fill="${color}" stroke="white" stroke-width="1.5">
                            <path d="M20.38 3.46L16 2H8L3.62 3.46a2 2 0 0 0-1.34 1.76V8c0 .42.26.8.65.95l3.69 1.43v10c0 1.1.9 2 2 2h7c1.1 0 2-.9 2-2V10.38l3.69-1.43c.39-.15.65-.53.65-.95V5.22a2 2 0 0 0-1.34-1.76z"/>
                        </svg>
                        <span class="absolute inset-0 flex items-center justify-center text-[10px] font-black text-white drop-shadow-md mt-2" id="num-${i}">?</span>
                    </div>
                    <div class="mt-2 bg-black/80 px-3 py-1 rounded-full border border-white/20 text-[10px] font-black uppercase text-center w-full shadow-xl" id="name-${i}">
                        Tap to Assign
                    </div>
                `;
                container.appendChild(node);
            });
        }

        function openModal(index) {
            activeSlotIndex = index;
            const select = document.getElementById('modalSelect');
            select.innerHTML = roster.map(p => `<option value="${p}">${p}</option>`).join('');
            document.getElementById('modal').classList.remove('hidden');
        }

        function confirmAssignment() {
            const name = document.getElementById('modalSelect').value;
            const num = document.getElementById('modalNumber').value || "10";
            document.getElementById(`name-${activeSlotIndex}`).innerText = name;
            document.getElementById(`num-${activeSlotIndex}`).innerText = num;
            closeModal();
        }

        function addToList() {
            const val = document.getElementById('newPlayerName').value;
            if(!val) return;
            roster.push(val);
            document.getElementById('newPlayerName').value = '';
            renderList();
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        
        function saveToMemory() {
            localStorage.setItem('jp_roster', JSON.stringify(roster));
            alert("Tactics and Roster saved to browser memory!");
        }

        document.getElementById('kitColor').addEventListener('input', renderPitch);

        init();
    </script>
</body>
</html>
