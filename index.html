<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soccer Lineup Pro | JP Tech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .pitch {
            background: #2e7d32;
            background-image: repeating-linear-gradient(90deg, #2e7d32, #2e7d32 10%, #388e3c 10%, #388e3c 20%);
            border: 4px solid white;
            position: relative;
            overflow: hidden;
        }
        .pitch::after {
            content: '';
            position: absolute;
            top: 50%; left: 0; right: 0; height: 2px;
            background: rgba(255,255,255,0.5);
        }
        .center-circle {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80px; height: 80px;
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 50%;
        }
        .player-slot {
            transition: all 0.3s ease;
        }
        .dragging { opacity: 0.5; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen">

    <div class="max-w-6xl mx-auto p-4 lg:p-8">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-green-400 tracking-tight">Soccer Lineup Pro</h1>
                <p class="text-slate-400 text-sm">Drag players from the squad to the pitch</p>
            </div>
            
            <div class="flex flex-wrap gap-3">
                <div class="flex items-center bg-slate-800 p-2 rounded-lg border border-slate-700">
                    <span class="text-xs mr-2 text-slate-400 uppercase font-bold">Kit Color</span>
                    <input type="color" id="kitColor" value="#ffffff" class="w-8 h-8 bg-transparent border-none cursor-pointer">
                </div>
                <select id="formationSelect" class="bg-slate-800 border border-slate-700 px-4 py-2 rounded-lg outline-none focus:border-green-500 text-sm">
                    <option value="4-4-2">4-4-2</option>
                    <option value="4-3-3">4-3-3</option>
                    <option value="3-5-2">3-5-2</option>
                </select>
                <button onclick="window.print()" class="bg-green-600 hover:bg-green-500 px-4 py-2 rounded-lg flex items-center gap-2 text-sm font-bold transition">
                    <i data-lucide="camera" class="w-4 h-4"></i> Save Image
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-slate-800 p-5 rounded-xl border border-slate-700 shadow-xl">
                    <h2 class="text-sm font-bold uppercase text-slate-400 mb-4 flex items-center gap-2">
                        <i data-lucide="plus-circle" class="w-4 h-4"></i> Add Player
                    </h2>
                    <div class="flex gap-2 mb-6">
                        <input type="text" id="playerNameInput" placeholder="Name..." class="flex-1 bg-slate-900 border border-slate-700 p-2 rounded text-sm focus:border-blue-500 outline-none">
                        <button onclick="addPlayerToBench()" class="bg-blue-600 px-3 rounded hover:bg-blue-500 transition">
                            <i data-lucide="plus" class="w-4 h-4"></i>
                        </button>
                    </div>

                    <h2 class="text-sm font-bold uppercase text-slate-400 mb-2">Bench (Draggable)</h2>
                    <div id="bench" class="space-y-2 min-h-[200px]">
                        </div>
                </div>
            </div>

            <div class="lg:col-span-3">
                <div class="pitch w-full aspect-[4/5] md:aspect-[4/3] rounded-lg shadow-2xl relative" id="soccerPitch">
                    <div class="center-circle"></div>
                    </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const formations = {
            "4-4-2": [
                {t: 88, l: 50, label: "GK"},
                {t: 70, l: 15}, {t: 70, l: 38}, {t: 70, l: 62}, {t: 70, l: 85},
                {t: 40, l: 15}, {t: 40, l: 38}, {t: 40, l: 62}, {t: 40, l: 85},
                {t: 15, l: 35}, {t: 15, l: 65}
            ],
            "4-3-3": [
                {t: 88, l: 50, label: "GK"},
                {t: 70, l: 15}, {t: 70, l: 38}, {t: 70, l: 62}, {t: 70, l: 85},
                {t: 45, l: 25}, {t: 45, l: 50}, {t: 45, l: 75},
                {t: 18, l: 15}, {t: 12, l: 50}, {t: 18, l: 85}
            ],
            "3-5-2": [
                {t: 88, l: 50, label: "GK"},
                {t: 70, l: 25}, {t: 70, l: 50}, {t: 70, l: 75},
                {t: 45, l: 10}, {t: 45, l: 30}, {t: 45, l: 50}, {t: 45, l: 70}, {t: 45, l: 90},
                {t: 15, l: 35}, {t: 15, l: 65}
            ]
        };

        const pitch = document.getElementById('soccerPitch');
        const bench = document.getElementById('bench');
        const kitColorInput = document.getElementById('kitColor');

        function renderPitch(type) {
            pitch.innerHTML = '<div class="center-circle"></div>';
            const positions = formations[type];
            
            positions.forEach((pos, i) => {
                const slot = document.createElement('div');
                slot.className = "player-slot absolute transform -translate-x-1/2 -translate-y-1/2 flex flex-col items-center w-20 text-center";
                slot.style.top = pos.t + "%";
                slot.style.left = pos.l + "%";
                slot.dataset.index = i;

                slot.innerHTML = `
                    <div class="jersey-icon w-10 h-10 rounded-full flex items-center justify-center font-bold border-2 border-black shadow-lg mb-1 transition-colors duration-300" 
                         style="background-color: ${kitColorInput.value}; color: #000">
                        ${pos.label || (i + 1)}
                    </div>
                    <div class="player-name-label bg-black/70 text-white text-[10px] px-2 py-0.5 rounded uppercase font-bold min-h-[1.2rem] min-w-[50px]">
                        Empty
                    </div>
                `;

                // Drop events
                slot.ondragover = (e) => e.preventDefault();
                slot.ondrop = (e) => {
                    const name = e.dataTransfer.getData("text/plain");
                    slot.querySelector('.player-name-label').innerText = name;
                };

                pitch.appendChild(slot);
            });
        }

        function addPlayerToBench() {
            const nameInput = document.getElementById('playerNameInput');
            if(!nameInput.value) return;

            const div = document.createElement('div');
            div.className = "bg-slate-700 p-3 rounded-lg flex justify-between items-center cursor-move hover:bg-slate-600 border border-slate-600 transition";
            div.draggable = true;
            div.innerHTML = `
                <span class="text-sm font-medium">${nameInput.value}</span>
                <i data-lucide="grip-horizontal" class="w-4 h-4 text-slate-500"></i>
            `;

            div.ondragstart = (e) => {
                e.dataTransfer.setData("text/plain", nameInput.value);
                div.classList.add('dragging');
            };
            div.ondragend = () => div.classList.remove('dragging');

            bench.appendChild(div);
            nameInput.value = '';
            lucide.createIcons();
        }

        kitColorInput.addEventListener('input', (e) => {
            document.querySelectorAll('.jersey-icon').forEach(j => {
                j.style.backgroundColor = e.target.value;
                // Brightness check for text color
                const color = e.target.value.substring(1);
                const rgb = parseInt(color, 16);
                const r = (rgb >> 16) & 0xff;
                const g = (rgb >>  8) & 0xff;
                const b = (rgb >>  0) & 0xff;
                const luma = 0.2126 * r + 0.7152 * g + 0.0722 * b;
                j.style.color = luma < 128 ? '#fff' : '#000';
            });
        });

        document.getElementById('formationSelect').addEventListener('change', (e) => renderPitch(e.target.value));

        // Initial Build
        renderPitch("4-4-2");
    </script>
</body>
</html>
